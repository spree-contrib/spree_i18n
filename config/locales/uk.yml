        title: Заголовок
        fit: Підігнати до
        info_hero_image_body: "<p>Розділ Головне Зображення додає велике зображення з кнопкою та текстом тегу на вашу сторінку.</p> <p>Кнопка може посилати на Товар, Таксон або Сторінку. Цей розділ може бути встановлений для вписування в центральний контейнер або до країв екрану.</p> <p><b>Порада:</b> Використовуйте головне зображення без тексту кнопки або заголовка, а потім встановіть <b>Підігнати до:</b> на <b>Контейнер</b> і <b>Поля</b> на <b>Використовувати поля</b> - це створює розділ з зображенням, який виглядає чудово над розділом Зображення біля Зображення або Галерея Зображень.</p> <p>Експериментуйте з налаштуваннями і не бійтеся використовувати більше одного розділу Головного Зображення на сторінці.</p>"
        info_image_gallery_body: "<p>Розділ Галерея Зображень може бути налаштований кількома способами. Наприклад, кожне зображення може посилати на товар або таксон. Якщо ви не надаєте посилання, ви можете відображати три зображення. Крім того, ви також можете використовувати мітки для додавання тексту до ваших зображень.</p> <p>Є дві конфігурації розміщення для розділу Галерея Зображень, з вищим зображенням, що використовується ліворуч або праворуч. Ви також можете встановити цей розділ для відповідності стилю вашого веб-сайту - до країв екрану або центрального контейнера.</p>"
        info_product_carousel_body: "<p>Карусель Товарів - це простий розділ для використання. Знайдіть таксон, який ви хочете відобразити, збережіть зміни, і товари у вашому обраному таксоні будуть відображені на вашій сторінці.</p>"
        info_featured_article_body: "<p>Розділ Функцій дозволяє додавати багатий текст на вашу сторінку з встановленим заголовком, підзаголовком та посиланням кнопки.</p> <p>Цей розділ може бути встановлений для використання повного екрану або контейнера та також використовувати поля.</p>"
        info_side_by_side_images_body: "<p>Розділ Зображень біля Зображень може бути налаштований кількома способами, у вас є можливість використовувати їх як прості зображення, зображення з текстом, і будь-яка з цих опцій може бути клікабельними посиланнями, якщо встановлено посилання.</p> <p><b>Порада:</b> Ви можете розширити ці зображення до краю екрану та видалити поля, щоб створити зовсім інший вигляд.</p>"
        info_rich_text_content_body: "<p>Розділ Вмісту з Різним Текстом - це просто розділ, який пропонує нічого більше, ніж область вмісту редактора різного тексту, яка буде відображатися на вашій сторінці.</p>"
