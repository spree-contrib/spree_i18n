        title: Título
        fit: Ajustar a
        info_hero_image_body: "<p>La sección <i>Hero Image</i> añade una gran imagen con un botón y un texto a tu página.</p> <p>El botón puede enlazar a un Producto, Taxón o Página. Esta sección puede ser configurada para encajar dentro del contenedor central o en los bordes de la pantalla.</p> <p><b>Consejo:</b> Utiliza una <i>Hero Image</i> sin botón o título, y después configura <b>Ajustar a:</b> como <b>Container</b> y <b>Columnas (Gutters)</b> como <b>Gutters</b>. Esto creará una sección que se ve genial sobre una sección <i>Side-by-Side Images</i>, o una sección <i>Image Gallery</i>.</p> <p>Experimenta con las configuraciones y no temas en utilizar más de una sección <i>Hero Image</i> por página.</p>"
        info_image_gallery_body: "<p>La sección <i>Image Gallery</i> puede ser configurada de múltiples formas. Por ejemplo, cada imagen puede enlazar con un Producto o Taxón. Si no incluyes un enlace, puedes mostrar tres imágenes. Además, también puedes usar etiquetas para añadir texto a tus imágenes.</p> <p>Existen dos configuraciones para mostrar la sección <i>Image Gallery</i> según la posición de la imagen más alta, que puede estar bien a la izquierda o la derecha. También puedes indicar que esta sección se ajuste a los bordes de la pantalla o  al contenedor central para que cumpla con el estilo de tu sitio web.</p>"
        info_product_carousel_body: "<p><i>Product Carousel</i> es una sección fácil de utilizar. Busca el Taxón que te gustaría mostrar, guarda los cambios, y esta mostrará en tu página los productos que pertenezcan a dicho taxón.</p>"
        info_featured_article_body: "<p>La sección <i>Feature Article</i> te permite añadir texto enriquecido a tu página, además de un título, subtítulo y un botón para enlaces.</p> <p>Esta sección puede configurarse para utilizarse a pantalla completa o en un contenedor, así como utilizar <i>gutters</i>.</p>"
        info_side_by_side_images_body: "<p>La sección <i>Side-by-Side Images</i> puede ser configurada de diferentes maneras, tienes la opción de usarlas simplemente como imágenes, imágenes y texto, y cualquiera de esas opciones puede ser clicable si se configura con un enlace.</p> <p><b>Consejo:</b> Puedes desplazar estas imágenes al borde de la pantalla y eliminar los <i>gutters</i> para crear un aspecto completamente diferente.</p>"
        info_rich_text_content_body: "<p>La sección <i>Rich Text Content</i> ofrece un área con un editor de texto enriquecido que se mostrará en tu página.</p>"
