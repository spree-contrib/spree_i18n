          title: Menús por defecto
          body: Los menús por defecto son menús cuyo idioma coincide con el idioma por defecto de tu tienda.<br><br> <h5>Ejemplo</h5>Si tienes una tienda cuyo idioma por defecto es el español pero también ofrece como opciones alemán y francés, el menú por defecto para esta tienda estará configurado para utilizar <b>Español (es)</b> como idioma y <b>Header</b> como la localización.<br><br> <h5>¿Por qué es importante tener un menú por defecto?</h5> El menú por defecto es el que se muestra al visitante en caso de que no exista un menú disponible para el idioma que está utilizando para navegar. Se recomienda que crees un menú por defecto para cada localización en cada tienda.<br><br> <h5>Más información</h5>Para aprender más sobre los menús, visita la documentación oficial de Spree haciendo <a href='https://user-docs.spreecommerce.org/content-management/building-the-main-menu' target='_blank' class='alert-link'>clic aquí</a>.
